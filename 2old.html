<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>COD COMMAND — Operations Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300&family=Quicksand:wght@400;500;600;700&family=Playfair+Display:wght@400;700&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --ink:#2A1F14;--gold:#C2A46E;--goldPale:#E8D9C0;--cream:#F8F4EF;--creamD:#EFE9E0;
  --terra:#C27B5A;--terraPale:#F0D9CC;--stone:#8A7E72;--border:#E0D8CE;
  --success:#3A6E4A;--danger:#8B3A3A;--warn:#7A6020;--info:#2A4A6E;
  --sidebar:210px;
}
body{background:#F0EDE8;font-family:'Quicksand',sans-serif;color:var(--ink);overflow:hidden;height:100vh;}
/* AUTH */
#authScreen{position:fixed;inset:0;background:#E8E2D8;display:flex;align-items:center;justify-content:center;z-index:9999;}
.authBox{background:#F5F0E8;border:1px solid #E0D8CE;border-radius:4px;padding:48px;width:360px;text-align:center;box-shadow:0 8px 40px rgba(42,31,20,0.12);}
.authLogo{font-family:'Playfair Display',serif;font-size:28px;color:var(--ink);letter-spacing:6px;margin-bottom:4px;}
.authSub{font-size:10px;letter-spacing:3px;color:#8A7E72;margin-bottom:36px;text-transform:uppercase;}
.authInput{width:100%;background:#F8F4EF;border:1px solid #E0D8CE;border-radius:2px;padding:12px 16px;color:var(--ink);font-family:'Quicksand',sans-serif;font-size:13px;margin-bottom:12px;}
.authInput::placeholder{color:#B0A898;}
.authBtn{width:100%;background:var(--gold);border:none;border-radius:2px;padding:13px;color:var(--ink);font-family:'Quicksand',sans-serif;font-size:12px;font-weight:700;letter-spacing:2px;cursor:pointer;margin-top:8px;}
.authErr{color:#C27B5A;font-size:11px;margin-top:8px;display:none;}
/* LAYOUT */
#app{display:none;height:100vh;flex-direction:row;}
/* SIDEBAR */
.sidebar{width:var(--sidebar);background:#DED6C8;display:flex;flex-direction:column;flex-shrink:0;overflow-y:auto;z-index:100;}
.sidebarLogo{padding:20px 20px 16px;border-bottom:1px solid rgba(42,31,20,0.1);}
.logoMain{font-family:'Playfair Display',serif;font-size:15px;color:#2A1F14;letter-spacing:4px;}
.logoSub{font-size:9px;letter-spacing:2px;color:#A09080;margin-top:2px;}
.sidebarUser{padding:12px 20px;border-bottom:1px solid rgba(42,31,20,0.1);display:flex;align-items:center;gap:10px;}
.userAvatar{width:30px;height:30px;border-radius:50%;background:#D4C9B8;border:1px solid #C2A46E;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:#2A1F14;}
.userName{font-size:11px;color:#2A1F14;font-weight:600;}
.userRole{font-size:9px;color:#9A8E82;letter-spacing:1px;}
.navSection{padding:14px 0 6px;}
.navLabel{font-size:8px;letter-spacing:2.5px;color:#B0A090;padding:0 20px 6px;text-transform:uppercase;}
.navItem{display:flex;align-items:center;gap:10px;padding:9px 20px;cursor:pointer;transition:all .15s;border-left:2px solid transparent;position:relative;}
.navItem:hover{background:rgba(42,31,20,0.06);}
.navItem.active{background:rgba(42,31,20,0.06);border-left-color:#C2A46E;}
.navItem .ni{width:16px;height:16px;display:flex;align-items:center;justify-content:center;color:#A89372;flex-shrink:0;}
.navItem .nl{font-size:11px;color:#6A5E54;font-weight:500;}
.navItem.active .nl{color:#2A1F14;font-weight:600;}
.navItem.active .ni{color:#C2A46E;}
.navBadge{position:absolute;right:16px;background:#C27B5A;color:#fff;border-radius:10px;padding:1px 6px;font-size:9px;font-weight:700;}
.sidebarLogout{margin-top:auto;padding:16px 20px;border-top:1px solid rgba(42,31,20,0.08);}
.logoutBtn{width:100%;background:transparent;border:1px solid rgba(42,31,20,0.15);border-radius:2px;padding:8px;color:#9A8E82;font-size:10px;letter-spacing:1px;cursor:pointer;font-family:'Quicksand',sans-serif;}
/* MAIN */
.mainArea{flex:1;display:flex;flex-direction:column;overflow:hidden;}
.topbar{background:#1C1510;border-bottom:1px solid rgba(194,164,110,0.2);padding:0 28px;height:56px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
.topbarTitle{font-family:'Playfair Display',serif;font-size:18px;color:#E8DDD0;}
.topbarMeta{font-size:10px;color:rgba(194,164,110,0.7);letter-spacing:1px;}
.topbarRight{display:flex;align-items:center;gap:16px;}
.entityBadge{background:var(--ink);color:var(--gold);font-size:9px;letter-spacing:2px;padding:4px 10px;border-radius:2px;font-weight:700;}
.content{flex:1;overflow-y:auto;padding:28px;background:#E8E2D8;}
/* CARDS */
.cardGrid{display:grid;gap:16px;}
.card{background:#F5F0E8;border:1px solid #D8D0C4;border-radius:6px;padding:20px;}
.cardTitle{font-size:8px;letter-spacing:3px;color:#A09080;text-transform:uppercase;margin-bottom:12px;font-weight:600;}
.statVal{font-family:'Cormorant Garamond',serif;font-size:28px;color:var(--ink);font-weight:600;}
.statSub{font-size:10px;color:var(--stone);margin-top:2px;}
/* ENTITY CARDS */
.entityCards{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin-bottom:24px;}
.entityCard{background:#F5F0E8;border:1px solid #D8D0C4;border-radius:6px;padding:20px;position:relative;overflow:hidden;}
.entityCard::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;}
.entityCard.ikigai::before{background:var(--gold);}
.entityCard.atelier::before{background:var(--terra);}
.entityCard.kori::before{background:#6B9E6E;}
.entityName{font-family:'Playfair Display',serif;font-size:13px;color:var(--ink);margin-bottom:2px;}
.entityTag{font-size:9px;color:var(--stone);letter-spacing:1px;margin-bottom:14px;}
.entityStat{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:6px;}
.entityStatL{font-size:10px;color:var(--stone);}
.entityStatV{font-family:'Cormorant Garamond',serif;font-size:16px;color:var(--ink);font-weight:600;}
.entityStatV.good{color:var(--success);}
.entityStatV.warn{color:var(--warn);}
.entityStatV.bad{color:var(--danger);}
/* SECTION HEADER */
.sectionHdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;}
.sectionTitle{font-family:'Playfair Display',serif;font-size:18px;color:#2A1F14;font-weight:400;letter-spacing:0.5px;}
.btnPrimary{background:transparent;border:1px solid #C2A46E;border-radius:0;padding:7px 18px;font-size:9px;font-weight:600;letter-spacing:2px;cursor:pointer;font-family:'Quicksand',sans-serif;color:#2A1F14;text-transform:uppercase;transition:all .2s;}
.btnSecondary{background:transparent;border:1px solid rgba(42,31,20,0.2);border-radius:0;padding:7px 14px;font-size:9px;color:#8A7E72;cursor:pointer;font-family:'Quicksand',sans-serif;letter-spacing:1px;text-transform:uppercase;}
.btnDanger{background:var(--danger);border:none;border-radius:2px;padding:5px 12px;font-size:10px;font-weight:700;color:#fff;cursor:pointer;font-family:'Quicksand',sans-serif;}
/* TABLE */
.table{width:100%;border-collapse:collapse;}
.table th{font-size:8px;letter-spacing:2.5px;color:#A09080;text-align:left;padding:10px 14px;border-bottom:1px solid #D8D0C4;background:#F0EAE0;text-transform:uppercase;font-weight:600;}
.table td{padding:12px 14px;border-bottom:1px solid rgba(42,31,20,0.07);font-size:12px;vertical-align:middle;color:#2A1F14;}
.table tr:hover td{background:#EAE4DA;}
/* BADGES */
.badge{display:inline-block;padding:2px 10px;border-radius:20px;font-size:8px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;}
.badge.active{background:#E8F0E8;color:var(--success);}
.badge.pending{background:#FFF0E0;color:#B05000;}
.badge.overdue{background:#F5E8E8;color:var(--danger);}
.badge.draft{background:#F0F0EE;color:var(--stone);}
.badge.signed{background:#E8F0E8;color:var(--success);}
.badge.sent{background:#FFF0E0;color:#B05000;}
.badge.high{background:#F5E8E8;color:var(--danger);}
.badge.medium{background:#FFF8E0;color:#8A6000;}
.badge.low{background:#E8F0E8;color:var(--success);}
.badge.approved{background:#E8F0E8;color:var(--success);}
/* PROGRESS */
.progress{background:#EFE9E0;border-radius:10px;height:6px;overflow:hidden;}
.progressBar{height:100%;background:var(--gold);border-radius:10px;transition:width .4s;}
/* ALERTS */
.alert{border-radius:0;padding:12px 18px;margin-bottom:12px;font-size:11px;display:flex;gap:12px;align-items:flex-start;border-left-width:2px;}
.alert.red{background:#FBF0F0;border-left:3px solid var(--danger);color:var(--danger);}
.alert.amber{background:#FFF8EC;border-left:3px solid #C2A46E;color:#7A6020;}
.alert.green{background:#F0F7F0;border-left:3px solid var(--success);color:var(--success);}
/* ACCORDION */
.accordion{border:1px solid var(--border);border-radius:4px;overflow:hidden;margin-bottom:8px;}
.accHdr{padding:12px 16px;background:#EDE8DF;display:flex;align-items:center;justify-content:space-between;cursor:pointer;user-select:none;}
.accHdr:hover{background:#E5DFD4;}
.accHdrL{display:flex;align-items:center;gap:10px;}
.accHdrTitle{font-size:13px;font-weight:600;color:var(--ink);}
.accHdrSub{font-size:10px;color:var(--stone);}
.accBody{display:none;padding:16px;border-top:1px solid #D8D0C4;background:#F5F0E8;}
.accBody.open{display:block;}
/* TABS */
.tabs{display:flex;gap:0;border-bottom:2px solid var(--border);margin-bottom:20px;}
.tab{padding:10px 18px;font-size:11px;font-weight:600;color:var(--stone);cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-2px;}
.tab.active{color:var(--gold);border-bottom-color:var(--gold);}
/* FORM */
.formRow{display:grid;gap:12px;margin-bottom:12px;}
.formRow.cols2{grid-template-columns:1fr 1fr;}
.formRow.cols3{grid-template-columns:1fr 1fr 1fr;}
label{font-size:10px;letter-spacing:1px;color:var(--stone);display:block;margin-bottom:4px;text-transform:uppercase;}
input,select,textarea{width:100%;border:1px solid var(--border);border-radius:2px;padding:9px 12px;font-family:'Quicksand',sans-serif;font-size:12px;color:var(--ink);background:#fff;}
input:focus,select:focus,textarea:focus{outline:2px solid var(--gold);outline-offset:-1px;}
/* QUEUE */
.queueItem{background:#F5F0E8;border:1px solid #D8D0C4;border-radius:6px;padding:14px 16px;margin-bottom:8px;display:flex;align-items:center;gap:14px;}
.queueIcon{font-size:16px;width:28px;text-align:center;color:#C2A46E;}
.queueMeta{flex:1;}
.queueType{font-size:9px;letter-spacing:2px;color:var(--stone);text-transform:uppercase;}
.queueTitle{font-size:13px;font-weight:600;color:var(--ink);margin-top:1px;}
.queueSub{font-size:10px;color:var(--stone);margin-top:2px;}
.queueActions{display:flex;gap:8px;}
.btnApprove{background:transparent;border:1px solid #3A6E4A;border-radius:0;padding:5px 14px;font-size:9px;color:#3A6E4A;font-weight:600;cursor:pointer;font-family:'Quicksand',sans-serif;letter-spacing:1.5px;text-transform:uppercase;}
.btnReject{background:transparent;border:1px solid #8B3A3A;border-radius:0;padding:5px 14px;font-size:9px;color:#8B3A3A;font-weight:600;cursor:pointer;font-family:'Quicksand',sans-serif;letter-spacing:1.5px;text-transform:uppercase;}
/* EXPENSE */
.expRow{display:grid;grid-template-columns:1fr 120px 100px 80px 80px;gap:8px;align-items:center;padding:8px 12px;border-bottom:1px solid var(--border);}
.expRow:hover{background:#FAFAF8;}
/* PROJECT CARD */
.projCard{background:#F5F0E8;border:1px solid #D8D0C4;border-radius:6px;padding:16px;margin-bottom:10px;}
.projName{font-size:14px;font-weight:700;color:var(--ink);margin-bottom:4px;}
.projMeta{font-size:10px;color:var(--stone);margin-bottom:10px;}
.projActions{display:flex;gap:8px;margin-top:10px;flex-wrap:wrap;}
.projActionBtn{padding:5px 14px;border-radius:0;font-size:8px;font-weight:600;letter-spacing:2px;cursor:pointer;font-family:'Quicksand',sans-serif;border:none;text-transform:uppercase;}
.projActionBtn.gold{background:transparent;border:1px solid #C2A46E;color:#2A1F14;}
.projActionBtn.outline{background:transparent;border:1px solid rgba(42,31,20,0.2);color:#8A7E72;}
.projActionBtn.disabled{background:#EEE;color:#AAA;cursor:not-allowed;}
/* MINI CHART */
.barChart{display:flex;align-items:flex-end;gap:6px;height:60px;}
.barCol{display:flex;flex-direction:column;align-items:center;gap:4px;flex:1;}
.bar{width:100%;background:var(--gold);border-radius:2px 2px 0 0;min-height:2px;transition:height .3s;}
.barLabel{font-size:8px;color:var(--stone);text-align:center;}
/* MODAL */
.modalOverlay{position:fixed;inset:0;background:rgba(26,18,8,0.7);z-index:500;display:none;align-items:center;justify-content:center;}
.modalOverlay.open{display:flex;}
.modal{background:#F5F0E8;border-radius:0;width:560px;max-height:85vh;overflow-y:auto;box-shadow:0 8px 40px rgba(42,31,20,0.15);border:1px solid #D8D0C4;}
.modalHdr{padding:20px 24px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;}
.modalTitle{font-family:'Playfair Display',serif;font-size:17px;color:var(--ink);}
.modalClose{background:none;border:none;font-size:20px;cursor:pointer;color:var(--stone);}
.modalBody{padding:24px;}
.modalFoot{padding:16px 24px;border-top:1px solid var(--border);display:flex;justify-content:flex-end;gap:10px;}
/* KORI */
.koriCard{background:linear-gradient(135deg,#1A3020,#0D1A10);border-radius:4px;padding:20px;color:#fff;}
.koriTitle{color:#8ECC8E;font-size:10px;letter-spacing:2px;margin-bottom:8px;}
.koriVal{font-family:'Cormorant Garamond',serif;font-size:32px;color:#fff;font-weight:600;}
.koriTarget{font-size:10px;color:rgba(255,255,255,0.5);margin-top:2px;}
/* SOCIAL */
.socialStat{text-align:center;padding:16px;}
.socialVal{font-family:'Cormorant Garamond',serif;font-size:26px;color:var(--ink);font-weight:600;}
.socialLabel{font-size:9px;color:var(--stone);letter-spacing:1px;margin-top:2px;}
/* SCROLLBAR */
::-webkit-scrollbar{width:5px;}
::-webkit-scrollbar-track{background:var(--creamD);}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px;}
.sidebar::-webkit-scrollbar-track{background:rgba(255,255,255,0.05);}
.sidebar::-webkit-scrollbar-thumb{background:rgba(194,164,110,0.2);}
/* REVENUE BAR */
.revBar{background:var(--creamD);border-radius:10px;height:10px;overflow:hidden;margin:8px 0;}
.revFill{height:100%;border-radius:10px;background:linear-gradient(90deg,var(--gold),var(--terra));}
/* SOP */
.sopSection{border:1px solid #D8D0C4;border-radius:6px;overflow:hidden;margin-bottom:8px;}
.sopHdr{padding:12px 16px;background:#EDE8DF;cursor:pointer;display:flex;justify-content:space-between;align-items:center;}
.sopHdr:hover{background:#E5DFD4;}
.sopHdrTitle{font-size:12px;font-weight:700;color:var(--ink);}
.sopBody{display:none;padding:16px;background:#F5F0E8;border-top:1px solid #D8D0C4;}
.sopBody.open{display:block;}
.sopBody p{font-size:12px;color:var(--stone);line-height:1.7;margin-bottom:8px;}
.sopBody ul{margin-left:16px;margin-bottom:8px;}
.sopBody li{font-size:12px;color:var(--stone);line-height:1.6;}
/* OVERDUE FLAG */
.overdueFlag{display:inline-block;width:8px;height:8px;background:var(--danger);border-radius:50%;margin-right:6px;animation:pulse 1.5s infinite;}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:0.4;}}
/* REVENUE GAUGE */
.gauge{position:relative;width:120px;height:60px;margin:0 auto;}
.gaugeSvg{width:120px;height:60px;}
/* news card */
.newsCard{border:1px solid #D8D0C4;border-radius:6px;padding:14px;margin-bottom:8px;background:#F5F0E8;}
.newsTag{font-size:9px;letter-spacing:1.5px;color:var(--gold);text-transform:uppercase;margin-bottom:4px;}
.newsTitle{font-size:12px;font-weight:700;color:var(--ink);margin-bottom:4px;}
.newsSnip{font-size:11px;color:var(--stone);line-height:1.5;}
.newsMeta{font-size:9px;color:var(--stone);margin-top:6px;}
</style>
</head>
<body>
<!-- AUTH -->
<div id="authScreen">
  <div class="authBox">
    <div class="authLogo">COD</div>
    <div class="authSub">COMMAND — OPERATIONS DASHBOARD</div>
    <input class="authInput" id="authUser" placeholder="Username" autocomplete="off"/>
    <input class="authInput" id="authPass" type="password" placeholder="Password"/>
    <button class="authBtn" onclick="doLogin()">SIGN IN</button>
    <div class="authErr" id="authErr">Invalid credentials. Try again.</div>
  </div>
</div>

<!-- APP -->
<div id="app" style="display:none;display:flex;">

<!-- SIDEBAR -->
<div class="sidebar" id="sidebar">
  <div class="sidebarLogo">
    <div class="logoMain" style="font-family:'Playfair Display',serif;letter-spacing:5px;color:#C2A46E;font-size:18px;font-weight:400">COD</div>
    <div class="logoSub">COMMAND — OPERATIONS</div>
  </div>
  <div class="sidebarUser">
    <div class="userAvatar" id="userAvatar"></div>
    <div>
      <div class="userName" id="userName"></div>
      <div class="userRole" id="userRoleLabel"></div>
    </div>
  </div>
  <div id="navMenu"></div>
  
  <div style="padding:12px 20px 0;border-top:1px solid rgba(42,31,20,0.08);">
    <div style="font-size:8px;letter-spacing:2px;color:#B0A090;margin-bottom:8px">ENTITIES</div>
    <div style="display:flex;flex-direction:column;gap:6px">
      <div style="display:flex;align-items:center;gap:8px"><span style="width:7px;height:7px;border-radius:50%;background:#C2A46E;display:inline-block"></span><span style="font-size:10px;color:#6A5E54">Ikigai Interior</span></div>
      <div style="display:flex;align-items:center;gap:8px"><span style="width:7px;height:7px;border-radius:50%;background:#6B9E6E;display:inline-block"></span><span style="font-size:10px;color:#6A5E54">Atelier</span></div>
      <div style="display:flex;align-items:center;gap:8px"><span style="width:7px;height:7px;border-radius:50%;background:#C27B5A;display:inline-block"></span><span style="font-size:10px;color:#6A5E54">Kori.art</span></div>
    </div>
  </div>
<div class="sidebarLogout">
    <button class="logoutBtn" onclick="doLogout()">SIGN OUT</button>
  </div>
</div>

<!-- MAIN -->
<div class="mainArea">
  <div class="topbar">
    <div>
      <div class="topbarTitle" id="pageTitle" style="font-family:'Playfair Display',serif;font-size:16px;color:#E8DDD0;font-weight:400;letter-spacing:1px">Dashboard</div>
      <div class="topbarMeta" id="pageMeta"></div>
    </div>
    <div class="topbarRight">
      <span class="entityBadge" id="entityBadge">IKIGAI INTERIOR</span>
      <span style="font-size:11px;color:rgba(194,164,110,0.6)" id="topDate"></span>
    </div>
  </div>
  <div class="content" id="mainContent"></div>
</div>

</div>

<!-- MODAL -->
<div class="modalOverlay" id="globalModal">
  <div class="modal">
    <div class="modalHdr">
      <div class="modalTitle" id="modalTitle">Modal</div>
      <button class="modalClose" onclick="closeModal()">&#x2715;</button>
    </div>
    <div class="modalBody" id="modalBody"></div>
    <div class="modalFoot" id="modalFoot"></div>
  </div>
</div>

<script>

function doLogin(){
  const u=document.getElementById('authUser').value.trim().toLowerCase();
  const p=document.getElementById('authPass').value;
  if(USERS[u]&&USERS[u].pass===p){
    currentUser={...USERS[u],username:u};
    document.getElementById('authScreen').style.display='none';
    document.getElementById('app').style.display='flex';
    initApp();
  } else {
    document.getElementById('authErr').style.display='block';
  }
}
document.addEventListener('keydown',e=>{if(e.key==='Enter')doLogin();});
function doLogout(){
  currentUser=null;
  document.getElementById('authScreen').style.display='flex';
  document.getElementById('app').style.display='none';
  document.getElementById('authUser').value='';
  document.getElementById('authPass').value='';
}

function navigate(page){
  document.querySelectorAll('.navItem').forEach(n=>n.classList.remove('active'));
  const el=document.getElementById('nav_'+page);
  if(el)el.classList.add('active');
  const titles={
    overview:'Dashboard',entities:'All Entities',myprojects:'My Projects',
    pipeline:'Project Pipeline',outstanding:'Project Outstanding',leads:'Leads',
    approvals:'Approval Queue',payments:'Payments + Claims',invoices:'Invoices',
    schedule:'Schedule',quotes:'Quotes + VOs',documents:'Documents',
    expenses:'Expenses + Expenditure',kori:'Kori.art MRR',tasks:'My Tasks',
    teamflags:'Team Flags',social:'Social + Ads',news:'Market + News',
    sop:'SOP',comments:'Comments + Feedback'
  };
  document.getElementById('pageTitle').textContent=titles[page]||page;
  document.getElementById('pageMeta').textContent=new Date().toLocaleDateString('en-SG',{month:'long',year:'numeric'});

function pct(a,b){return b>0?Math.round(a/b*100):0;}

function myProjects(){

// ── PIPELINE ────────────────────────────────────────────
pages.pipeline=function(){
  const isDir=currentUser.role==='director';
  const projs=myProjects();
  const staffGroups={};
  projs.forEach(p=>{
    if(!staffGroups[p.staff])staffGroups[p.staff]=[];
    staffGroups[p.staff].push(p);
  });
  let html=`<table class="table"><thead><tr>
    <th>Project</th><th>Client</th>${isDir?'<th>Staff</th>':''}<th>Entity</th><th>Type</th><th>Value</th><th>Phase</th><th>Status</th><th>Outstanding</th>
  </tr></thead><tbody>`;
  let grandTotal=0;
  Object.entries(staffGroups).forEach(([staff,sProjs])=>{
    const subtotal=sProjs.reduce((a,p)=>a+p.value,0);
    grandTotal+=subtotal;
    if(isDir)html+=`<tr style="background:#F8F4EF"><td colspan="9" style="font-size:10px;font-weight:700;color:var(--stone);letter-spacing:1px;padding:6px 12px">${staff.toUpperCase()}</td></tr>`;
    sProjs.forEach(p=>{
      html+=`<tr>
        <td style="font-weight:600">${p.name}</td>
        <td style="font-size:11px;color:var(--stone)">${p.client}</td>
        ${isDir?`<td>${p.staff}</td>`:''}

        <td style="font-size:11px">${p.type}</td>
        <td style="font-family:'Cormorant Garamond',serif;font-size:15px;font-weight:600">${fmt(p.value)}</td>
        <td><span class="badge ${p.status==='Active'?'active':'draft'}">${p.phase}</span></td>
        <td>${badgeHtml(p.status,p.status==='Active'?'signed':'draft')}</td>
        <td style="font-family:'Cormorant Garamond',serif;font-size:13px;color:${p.overdueAmt>0?'var(--danger)':'var(--stone)'}">${p.overdueAmt>0?fmt(p.overdueAmt):'—'}</td>
      </tr>`;
    });
    if(isDir)html+=`<tr style="background:#F0EDE8"><td colspan="${isDir?5:4}" style="text-align:right;font-size:10px;font-weight:700;color:var(--stone);padding:6px 12px">SUBTOTAL — ${staff}</td><td style="font-family:'Cormorant Garamond',serif;font-size:16px;font-weight:600;padding:6px 12px">${fmt(subtotal)}</td><td colspan="3"></td></tr>`;

  html+=`</tbody></table>`;
  return html;
};

    done.forEach(q=>{
      html+=`<div class="queueItem" style="opacity:0.6">

    html+=`<div class="card" style="margin-bottom:12px;border-left:3px solid ${hasCrit?'var(--danger)':'var(--gold)'}">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
        <div>
          <div style="font-size:13px;font-weight:700;color:var(--ink)">${s.name}</div>
          <div style="font-size:10px;color:var(--stone)">${s.role}</div>
        </div>
        <div>${hasCrit?'<span class="badge overdue">CRITICAL</span>':''}</div>
      </div>
      <table class="table"><thead><tr><th>Task</th><th>Due</th><th>Urgency</th></tr></thead><tbody>
      ${s.flags.map(f=>`<tr>
        <td>${f.task}</td>
        <td style="color:${f.due==='Overdue'?'var(--danger)':'inherit'};font-weight:${f.due==='Overdue'?'700':'400'}">${f.due}</td>
        <td>${badgeHtml(f.urgency,f.urgency==='Critical'?'overdue':f.urgency==='High'?'high':'medium')}</td>
      </tr>`).join('')}
      </tbody></table>
    </div>`;
  });
  return html;
};
</script>
<script>
// ── SOCIAL + ADS ─────────────────────────────────────────
pages.social=function(){
  const isDir=currentUser.role==='director';

    <div class="card" style="text-align:center"><div class="cardTitle">IG FOLLOWERS</div><div class="statVal">${SOCIAL.ig.followers.toLocaleString()}</div><div class="statSub">@ikigai_interior</div></div>
    <div class="card" style="text-align:center"><div class="cardTitle">IG 7-DAY REACH</div><div class="statVal">${SOCIAL.ig.reach7d.toLocaleString()}</div><div class="statSub">Last post: ${SOCIAL.ig.lastPost}</div></div>
    <div class="card" style="text-align:center"><div class="cardTitle">FB PAGE VIEWS</div><div class="statVal">${SOCIAL.fb.pageViews}</div><div class="statSub">7-day</div></div>
    <div class="card" style="text-align:center"><div class="cardTitle">BREVO SUBSCRIBERS</div><div class="statVal">${SOCIAL.brevo.subscribers}</div><div class="statSub">Office CBD Wave 1</div></div>
  </div>`;
  if(isDir){
    html+=`<div class="sectionHdr"><div class="sectionTitle">Meta Ads</div></div>`;

    ${SOCIAL.metaAds.map(ad=>`<tr>
      <td style="font-weight:600">${ad.name}</td>
      <td style="font-family:'Cormorant Garamond',serif;font-size:14px">${fmt(ad.spend)}</td>
      <td>${ad.reach.toLocaleString()}</td>
      <td>${ad.clicks}</td>
      <td>${ad.ctr}</td>
      <td>${ad.cpc}</td>
      <td>${badgeHtml(ad.status,'active')}</td>
    </tr>`).join('')}
    </tbody></table>
    <div class="sectionHdr" style="margin-top:20px"><div class="sectionTitle">Brevo Email Campaign</div></div>
    <div class="card">
      <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:16px">
        <div><div class="cardTitle">NEXT SEND</div><div style="font-size:13px;font-weight:600;color:var(--gold)">${SOCIAL.brevo.nextSend}</div></div>
        <div><div class="cardTitle">ARTWORK STATUS</div><div style="font-size:12px;color:var(--danger);font-weight:600">◆ 111 Somerset photo needed</div></div>
        <div><div class="cardTitle">WAVE SCHEDULE</div>
          <div style="font-size:10px;color:var(--stone);line-height:1.8">
            Email 1 → Tue 30 Jun<br>Email 2 → Sun 5 Jul<br>Email 3 → Fri 10 Jul
          </div>
        </div>
      </div>
    </div>`;
  } else {
    html+=`<div class="alert amber"><span style="color:var(--info);font-size:16px">◆</span><div>Full campaign management available to Director. Contact Dylan for ad budget changes.</div></div>`;

// ── NEWS ─────────────────────────────────────────────────
pages.news=function(){
  let html=`<div class="sectionHdr"><div class="sectionTitle">Market + Industry Intelligence</div><button class="btnPrimary" onclick="openAddNews()">+ Add Article</button></div>`;
  const pinned=NEWS.filter(n=>n.pinned);
  const rest=NEWS.filter(n=>!n.pinned);
  if(pinned.length){
    html+=`<div style="font-size:9px;letter-spacing:2px;color:var(--gold);margin-bottom:8px;font-weight:700">PINNED</div>`;
    pinned.forEach(n=>{html+=newsCard(n,true);});
  }
  html+=`<div style="font-size:9px;letter-spacing:2px;color:var(--stone);margin-bottom:8px;font-weight:700;margin-top:16px">LATEST</div>`;
  rest.forEach(n=>{html+=newsCard(n,false);});
  return html;
};
function newsCard(n,pinned){
  return`<div class="newsCard" ${pinned?'style="border-left:3px solid var(--gold)"':''}>
    <div class="newsTag">${n.tag}</div>
    <div class="newsTitle">${n.title}</div>
    <div class="newsSnip">${n.snippet}</div>
    <div class="newsMeta">${n.date} ${pinned?'· Pinned':''}</div>
  </div>`;
}
function openAddNews(){
  openModal('Add Market Intelligence',`<div class="formRow"><div><label>Tag</label><select><option>Market Insight</option><option>Industry</option><option>Competitor</option><option>Opportunity</option><option>Regulatory</option></select></div></div>
  <div class="formRow"><div><label>Headline</label><input placeholder="Article title or insight..."/></div></div>
  <div class="formRow"><div><label>Summary</label><textarea rows="3" placeholder="Key takeaway in 1-2 sentences..."></textarea></div></div>
  <div class="formRow cols2"><div><label>Date</label><input type="date" value="${new Date().toISOString().split('T')[0]}"/></div><div><label>Pin?</label><select><option value="0">No</option><option value="1">Yes — pin to top</option></select></div></div>`,
  `<button class="btnSecondary" onclick="closeModal()">Cancel</button><button class="btnPrimary" onclick="closeModal();alert('Article added.')">Save</button>`);
}

// ── SOP ──────────────────────────────────────────────────
pages.sop=function(){
  let html=`<div class="alert green" style="margin-bottom:16px"><span style="color:var(--gold);font-size:14px">—</span><div>Ikigai Interior Standard Operating Procedures — v2. Read-only. Updates via Director only.</div></div>`;
  SOP_SECTIONS.forEach((s,i)=>{
    html+=`<div class="sopSection">
      <div class="sopHdr" onclick="toggleSOP(this)">
        <div class="sopHdrTitle">${s.title}</div>
        <span id="sopChev${i}">▾</span>
      </div>
      <div class="sopBody" id="sopBody${i}">${s.content}</div>
    </div>`;
  });
  return html;
};
function toggleSOP(el){
  const body=el.nextElementSibling;
  body.classList.toggle('open');
}

// ── COMMENTS ─────────────────────────────────────────────
pages.comments=function(){
  let html=`<div class="sectionHdr"><div class="sectionTitle">Comments + Feedback</div></div>`;
  html+=`<div class="card" style="margin-bottom:16px">
    <div class="cardTitle">SUBMIT FEEDBACK</div>
    <div class="formRow cols2" style="margin-bottom:10px">
      <div><label>Category</label><select id="fbCat"><option>Bug Report</option><option>Feature Request</option><option>Process Feedback</option><option>General Comment</option></select></div>
      <div><label>Priority</label><select id="fbPri"><option>Low</option><option>Medium</option><option>High</option></select></div>
    </div>
    <div class="formRow" style="margin-bottom:10px"><div><label>Comment</label><textarea id="fbText" rows="3" placeholder="Describe the issue or feedback..."></textarea></div></div>
    <button class="btnPrimary" onclick="submitFeedback()">Submit</button>
  </div>
  <div id="feedbackLog">
    <div class="cardTitle" style="margin-bottom:10px">SUBMITTED FEEDBACK</div>
    <div class="queueItem"><div class="queueIcon">•</div><div class="queueMeta"><div class="queueType">BUG REPORT · Euric Ng · 24 Jun</div><div class="queueTitle">Drag-and-drop in Quote Builder resets QTY</div><div class="queueSub">Fixed in v5. Pending Euric confirmation.</div></div><div>${badgeHtml('In Progress','pending')}</div></div>
    <div class="queueItem"><div class="queueIcon">•</div><div class="queueMeta"><div class="queueType">FEATURE REQUEST · Tammy Vu · 22 Jun</div><div class="queueTitle">Add client name auto-fill from previous quotes</div><div class="queueSub">Backlog — Phase 2</div></div><div>${badgeHtml('Backlog','draft')}</div></div>
  </div>`;
  return html;
};
function submitFeedback(){
  const cat=document.getElementById('fbCat').value;
  const pri=document.getElementById('fbPri').value;
  const txt=document.getElementById('fbText').value;
  if(!txt.trim()){alert('Please enter a comment.');return;}
  const log=document.getElementById('feedbackLog');
  const item=document.createElement('div');
  item.className='queueItem';
  item.innerHTML=`<div class="queueIcon">▢</div><div class="queueMeta"><div class="queueType">${cat} · ${currentUser.name} · ${new Date().toLocaleDateString('en-SG')}</div><div class="queueTitle">${txt}</div><div class="queueSub">Priority: ${pri}</div></div><div>${badgeHtml('New','active')}</div>`;
  log.appendChild(item);
  document.getElementById('fbText').value='';
  alert('Feedback submitted. Thank you.');
}

function toggleAcc(el){
  const body=el.nextElementSibling;
  body.classList.toggle('open');
  const arrow=el.querySelector('span:last-child');
  if(arrow)arrow.textContent=body.classList.contains('open')?'▴':'▾';
}

// Date/time in topbar
setInterval(()=>{
  const el=document.getElementById('topDate');
  if(el)el.textContent=new Date().toLocaleDateString('en-SG',{weekday:'short',day:'numeric',month:'short',year:'numeric'});
},60000);
