<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>COD — Command Operations Dashboard</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; }
    body {
      font-family: 'Helvetica Neue', Arial, sans-serif;
      background: #1C1A17;
      color: #F0E8D8;
      -webkit-font-smoothing: antialiased;
    }
    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-track { background: #1C1A17; }
    ::-webkit-scrollbar-thumb { background: #C9A96E44; border-radius: 3px; }
    input:-webkit-autofill,
    input:-webkit-autofill:focus {
      -webkit-box-shadow: 0 0 0 1000px #1E1C19 inset !important;
      -webkit-text-fill-color: #F0E8D8 !important;
    }
    a { text-decoration: none; }
    button { cursor: pointer; font-family: inherit; }
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef } = React;

/* ─── Brand tokens ────────────────────────────────── */
const C = {
  ink:      '#1C1A17',
  ink2:     '#201E1B',
  card:     '#252320',
  card2:    '#2A2826',
  border:   '#3A3630',
  border2:  '#4A4640',
  cream:    '#F0E8D8',
  cream2:   '#C8C0B0',
  muted:    '#7A7268',
  gold:     '#C9A96E',
  goldDim:  '#8A7248',
  red:      '#C05050',
};
const SERIF = "'Georgia', 'Times New Roman', serif";
const SANS  = "'Helvetica Neue', Arial, sans-serif";

/* ─── Users ───────────────────────────────────────── */
const USERS = {
  dylan:  { pass: 'ikigai2026', name: 'Dylan Lu',   role: 'Director',          initial: 'D' },
  tammy:  { pass: 'tammy2026',  name: 'Tammy Vu',   role: 'Interior Designer', initial: 'T' },
  euric:  { pass: 'euric2026',  name: 'Euric Ng',   role: 'Interior Designer', initial: 'E' },
  chloe:  { pass: 'chloe2026',  name: 'Chloe',      role: 'Interior Designer', initial: 'C' },
};

/* ─── Tools ───────────────────────────────────────── */
const TOOLS = [
  {
    id:      'quote',
    label:   'CODSTUDIO',
    sub:     'Quotation Builder',
    ver:     'v6.5',
    desc:    'Create, manage and issue client quotations with GST handling, variation orders, signatures, and payment tracking.',
    url:     'https://ikigaiinterior-sg.github.io/quote-cod',
    icon:    '◻',
    stat:    'Live',
  },
  {
    id:      'planner',
    label:   'IKIGAI SCHEDULE',
    sub:     'Project Planner',
    ver:     'v1',
    desc:    'Gantt-based project timeline with phase controls, PE/URA milestones anchored to Measurement Day, and SG public holidays.',
    url:     'https://ikigaiinterior-sg.github.io/planner_cod',
    icon:    '◫',
    stat:    'Live',
  },
];

/* ─── Clock hook ──────────────────────────────────── */
function useSGTClock() {
  const [now, setNow] = useState(new Date());
  useEffect(() => {
    const t = setInterval(() => setNow(new Date()), 1000);
    return () => clearInterval(t);
  }, []);
  const sgt = new Date(now.toLocaleString('en-US', { timeZone: 'Asia/Singapore' }));
  const pad = n => String(n).padStart(2, '0');
  const DAYS   = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
  const MONTHS = ['January','February','March','April','May','June','July','August','September','October','November','December'];
  const SHORT_MONTHS = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  return {
    time:    `${pad(sgt.getHours())}:${pad(sgt.getMinutes())}:${pad(sgt.getSeconds())}`,
    dateLong:`${DAYS[sgt.getDay()]}, ${sgt.getDate()} ${MONTHS[sgt.getMonth()]} ${sgt.getFullYear()}`,
    dateShort:`${sgt.getDate()} ${SHORT_MONTHS[sgt.getMonth()]} ${sgt.getFullYear()}`,
    hour:    sgt.getHours(),
    dow:     sgt.getDay(),
  };
}

/* ─── Login ───────────────────────────────────────── */
function LoginScreen({ onLogin }) {
  const [user, setUser]   = useState('');
  const [pass, setPass]   = useState('');
  const [err,  setErr]    = useState('');
  const [shake, setShake] = useState(false);
  const { time, dateLong } = useSGTClock();
  const passRef = useRef();

  const attempt = () => {
    const u = USERS[user.toLowerCase().trim()];
    if (u && u.pass === pass) {
      onLogin({ key: user.toLowerCase().trim(), ...u });
    } else {
      setErr('Incorrect credentials — please try again.');
      setPass('');
      setShake(true);
      setTimeout(() => setShake(false), 500);
    }
  };

  const iStyle = {
    width: '100%',
    background: C.ink2,
    border: `1px solid ${C.border}`,
    borderRadius: 4,
    padding: '12px 14px',
    fontSize: 14,
    color: C.cream,
    outline: 'none',
    transition: 'border-color .15s',
  };

  return (
    <div style={{
      minHeight: '100vh',
      display: 'flex',
      flexDirection: 'column',
      alignItems: 'center',
      justifyContent: 'center',
      padding: 24,
      background: `radial-gradient(ellipse at 50% 0%, #2A2620 0%, ${C.ink} 60%)`,
    }}>
      {/* Word-mark */}
      <div style={{ textAlign: 'center', marginBottom: 48 }}>
        <div style={{
          fontSize: 11,
          letterSpacing: 5,
          color: C.gold,
          textTransform: 'uppercase',
          marginBottom: 14,
        }}>
          IKIGAI INTERIOR PTE LTD
        </div>
        <div style={{
          fontFamily: SERIF,
          fontSize: 30,
          color: C.cream,
          letterSpacing: 1,
          marginBottom: 8,
        }}>
          Command Operations
        </div>
        <div style={{
          fontFamily: SERIF,
          fontSize: 30,
          color: C.cream,
          letterSpacing: 1,
          marginBottom: 16,
        }}>
          Dashboard
        </div>
        <div style={{
          display: 'inline-block',
          border: `1px solid ${C.goldDim}`,
          borderRadius: 2,
          padding: '2px 10px',
          fontSize: 10,
          letterSpacing: 3,
          color: C.muted,
        }}>
          COD v5.6
        </div>
      </div>

      {/* Card */}
      <div
        style={{
          background: C.card,
          border: `1px solid ${C.border}`,
          borderRadius: 8,
          padding: '32px 32px 28px',
          width: '100%',
          maxWidth: 360,
          animation: shake ? 'none' : undefined,
          transform: shake ? 'translateX(-4px)' : 'translateX(0)',
          transition: 'transform .05s',
        }}
      >
        {/* Username */}
        <div style={{ marginBottom: 16 }}>
          <label style={{ display: 'block', fontSize: 10, letterSpacing: 2, color: C.muted, textTransform: 'uppercase', marginBottom: 6 }}>
            Username
          </label>
          <input
            style={iStyle}
            placeholder="dylan · tammy · euric · chloe"
            value={user}
            autoComplete="username"
            onChange={e => { setUser(e.target.value); setErr(''); }}
            onKeyDown={e => e.key === 'Enter' && passRef.current?.focus()}
            onFocus={e => e.target.style.borderColor = C.gold}
            onBlur={e => e.target.style.borderColor = C.border}
          />
        </div>

        {/* Password */}
        <div style={{ marginBottom: 22 }}>
          <label style={{ display: 'block', fontSize: 10, letterSpacing: 2, color: C.muted, textTransform: 'uppercase', marginBottom: 6 }}>
            Password
          </label>
          <input
            ref={passRef}
            type="password"
            style={iStyle}
            placeholder="••••••••••"
            value={pass}
            autoComplete="current-password"
            onChange={e => { setPass(e.target.value); setErr(''); }}
            onKeyDown={e => e.key === 'Enter' && attempt()}
            onFocus={e => e.target.style.borderColor = C.gold}
            onBlur={e => e.target.style.borderColor = C.border}
          />
        </div>

        {/* Error */}
        {err && (
          <div style={{ fontSize: 12, color: C.red, marginBottom: 16, textAlign: 'center' }}>
            {err}
          </div>
        )}

        {/* Button */}
        <button
          onClick={attempt}
          style={{
            width: '100%',
            background: C.gold,
            color: C.ink,
            border: 'none',
            borderRadius: 4,
            padding: '12px 0',
            fontSize: 12,
            fontWeight: 700,
            letterSpacing: 3,
            textTransform: 'uppercase',
          }}
          onMouseEnter={e => e.currentTarget.style.background = '#D4B87A'}
          onMouseLeave={e => e.currentTarget.style.background = C.gold}
        >
          Enter
        </button>
      </div>

      {/* Clock */}
      <div style={{ marginTop: 32, textAlign: 'center' }}>
        <div style={{ fontSize: 18, fontVariantNumeric: 'tabular-nums', color: C.muted, letterSpacing: 2 }}>
          {time}
        </div>
        <div style={{ fontSize: 11, color: '#4A4640', marginTop: 4 }}>
          {dateLong} · SGT
        </div>
      </div>
    </div>
  );
}

/* ─── Tool Card ───────────────────────────────────── */
function ToolCard({ tool }) {
  const [hover, setHover] = useState(false);
  return (
    <a
      href={tool.url}
      target="_blank"
      rel="noopener noreferrer"
      onMouseEnter={() => setHover(true)}
      onMouseLeave={() => setHover(false)}
      style={{
        display: 'block',
        background: hover ? C.card2 : C.card,
        border: `1px solid ${hover ? C.gold : C.border}`,
        borderRadius: 8,
        padding: '28px 28px 24px',
        transition: 'all .18s',
        textDecoration: 'none',
      }}
    >
      {/* Top row */}
      <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start', marginBottom: 16 }}>
        <div>
          <div style={{ fontSize: 10, letterSpacing: 3, color: C.gold, textTransform: 'uppercase', marginBottom: 5 }}>
            {tool.label}
          </div>
          <div style={{ fontFamily: SERIF, fontSize: 20, color: C.cream, marginBottom: 2 }}>
            {tool.sub}
          </div>
          <div style={{ fontSize: 11, color: C.muted }}>
            {tool.ver}
          </div>
        </div>
        <div style={{
          background: '#1A3020',
          border: '1px solid #2A5030',
          borderRadius: 20,
          padding: '3px 10px',
          fontSize: 10,
          letterSpacing: 1.5,
          color: '#5A9A60',
          textTransform: 'uppercase',
          flexShrink: 0,
        }}>
          ● {tool.stat}
        </div>
      </div>

      {/* Divider */}
      <div style={{ height: 1, background: C.border, marginBottom: 16 }} />

      {/* Desc */}
      <div style={{ fontSize: 12, color: C.cream2, lineHeight: 1.7, marginBottom: 20 }}>
        {tool.desc}
      </div>

      {/* CTA */}
      <div style={{
        display: 'flex',
        alignItems: 'center',
        gap: 6,
        fontSize: 11,
        letterSpacing: 2,
        color: hover ? C.gold : C.muted,
        textTransform: 'uppercase',
        transition: 'color .18s',
      }}>
        Open Tool
        <span style={{ fontSize: 14, marginTop: -1 }}>→</span>
      </div>
    </a>
  );
}

/* ─── Dashboard ───────────────────────────────────── */
function Dashboard({ user, onLogout }) {
  const { time, dateLong, hour } = useSGTClock();
  const greeting = hour < 12 ? 'Good morning' : hour < 18 ? 'Good afternoon' : 'Good evening';
  const firstName = user.name.split(' ')[0];

  return (
    <div style={{ minHeight: '100vh', display: 'flex', flexDirection: 'column' }}>

      {/* ── Top nav ── */}
      <div style={{
        display: 'flex',
        alignItems: 'center',
        justifyContent: 'space-between',
        padding: '0 32px',
        height: 52,
        background: '#191714',
        borderBottom: `1px solid ${C.border}`,
        flexShrink: 0,
      }}>
        {/* Left */}
        <div style={{ display: 'flex', alignItems: 'center', gap: 14 }}>
          <span style={{ fontSize: 11, letterSpacing: 4, color: C.gold, textTransform: 'uppercase' }}>
            Ikigai Interior
          </span>
          <span style={{ color: C.border, fontSize: 18 }}>|</span>
          <span style={{ fontSize: 11, color: C.muted, letterSpacing: 1 }}>
            COD v5.6
          </span>
        </div>
        {/* Right */}
        <div style={{ display: 'flex', alignItems: 'center', gap: 18 }}>
          <div style={{ fontVariantNumeric: 'tabular-nums', fontSize: 12, color: C.muted, letterSpacing: 1 }}>
            {time} <span style={{ fontSize: 10, letterSpacing: 2 }}>SGT</span>
          </div>
          <div style={{
            width: 1, height: 20, background: C.border,
          }} />
          {/* Avatar */}
          <div style={{ display: 'flex', alignItems: 'center', gap: 10 }}>
            <div style={{
              width: 30, height: 30,
              borderRadius: '50%',
              background: `${C.goldDim}55`,
              border: `1px solid ${C.goldDim}`,
              display: 'flex', alignItems: 'center', justifyContent: 'center',
              fontSize: 12, color: C.gold, fontWeight: 700,
            }}>
              {user.initial}
            </div>
            <div>
              <div style={{ fontSize: 12, color: C.cream, lineHeight: 1.2 }}>{user.name}</div>
              <div style={{ fontSize: 10, color: C.muted, lineHeight: 1.2 }}>{user.role}</div>
            </div>
          </div>
          <button
            onClick={onLogout}
            style={{
              background: 'none',
              border: `1px solid ${C.border}`,
              borderRadius: 3,
              padding: '5px 13px',
              fontSize: 10,
              color: C.muted,
              letterSpacing: 1.5,
              textTransform: 'uppercase',
              transition: 'border-color .15s',
            }}
            onMouseEnter={e => { e.currentTarget.style.borderColor = C.border2; e.currentTarget.style.color = C.cream2; }}
            onMouseLeave={e => { e.currentTarget.style.borderColor = C.border; e.currentTarget.style.color = C.muted; }}
          >
            Log out
          </button>
        </div>
      </div>

      {/* ── Body ── */}
      <div style={{ flex: 1, overflowY: 'auto', padding: '52px 32px 60px' }}>
        <div style={{ maxWidth: 840, margin: '0 auto' }}>

          {/* Greeting */}
          <div style={{ marginBottom: 52 }}>
            <div style={{
              fontSize: 10,
              letterSpacing: 4,
              color: C.gold,
              textTransform: 'uppercase',
              marginBottom: 12,
            }}>
              Command Operations Dashboard
            </div>
            <div style={{ fontFamily: SERIF, fontSize: 34, color: C.cream, marginBottom: 6 }}>
              {greeting}, {firstName}.
            </div>
            <div style={{ fontSize: 13, color: C.muted }}>
              {dateLong} · Singapore
            </div>
          </div>

          {/* Rule */}
          <div style={{ display: 'flex', alignItems: 'center', gap: 16, marginBottom: 28 }}>
            <div style={{ fontSize: 10, letterSpacing: 3, color: C.muted, textTransform: 'uppercase', whiteSpace: 'nowrap' }}>
              Active Tools
            </div>
            <div style={{ flex: 1, height: 1, background: C.border }} />
            <div style={{ fontSize: 10, color: C.muted }}>
              {TOOLS.length} of {TOOLS.length} live
            </div>
          </div>

          {/* Tool cards */}
          <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 16, marginBottom: 48 }}>
            {TOOLS.map(t => <ToolCard key={t.id} tool={t} />)}
          </div>

          {/* Info strip */}
          <div style={{
            border: `1px solid ${C.border}`,
            borderRadius: 6,
            overflow: 'hidden',
          }}>
            {/* Header */}
            <div style={{
              background: '#1E1C19',
              borderBottom: `1px solid ${C.border}`,
              padding: '10px 20px',
              fontSize: 10,
              letterSpacing: 2.5,
              color: C.muted,
              textTransform: 'uppercase',
            }}>
              Company
            </div>
            {/* Content */}
            <div style={{
              background: C.card,
              padding: '20px 20px',
              display: 'flex',
              gap: 0,
            }}>
              {[
                { label: 'Entity', value: 'Ikigai Interior Pte Ltd', sub: 'GST-registered · UEN 202041797K' },
                { label: 'Entity', value: 'Ikigai Design Atelier', sub: 'Non-GST entity' },
                { label: 'Team', value: 'Dylan Lu · Tammy Vu', sub: 'Euric Ng · Chloe' },
                { label: 'Contact', value: '+65 8188 7556', sub: 'work@ikigaiinterior.com' },
              ].map((item, i, arr) => (
                <div key={i} style={{
                  flex: 1,
                  padding: '0 20px',
                  borderRight: i < arr.length - 1 ? `1px solid ${C.border}` : 'none',
                }}>
                  <div style={{ fontSize: 9, letterSpacing: 2, color: C.goldDim, textTransform: 'uppercase', marginBottom: 6 }}>
                    {item.label}
                  </div>
                  <div style={{ fontSize: 12, color: C.cream, marginBottom: 2 }}>{item.value}</div>
                  <div style={{ fontSize: 11, color: C.muted }}>{item.sub}</div>
                </div>
              ))}
            </div>
          </div>

          {/* Footer note */}
          <div style={{ marginTop: 32, textAlign: 'center', fontSize: 11, color: '#3A3630' }}>
            Ikigai Interior Pte Ltd · Internal use only · COD System v5.6
          </div>

        </div>
      </div>
    </div>
  );
}

/* ─── App root ────────────────────────────────────── */
function App() {
  const [user, setUser] = useState(null);
  return user
    ? <Dashboard user={user} onLogout={() => setUser(null)} />
    : <LoginScreen onLogin={setUser} />;
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
</body>
</html>
